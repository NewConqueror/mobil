name: daily_mood
description: "Ruh Hali Takibi ve Günlük Uygulaması - Android"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Charts
  fl_chart: ^0.68.0
  
  # Date and Time
  intl: ^0.19.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  
  # Background Work
  android_alarm_manager_plus: ^4.0.4
  
  # JSON handling
  json_annotation: ^4.8.1
  
  # File System
  path_provider: ^2.1.4
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation for JSON
  build_runner: ^2.4.9
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^4.0.0

# Flutter configuration (Android optimized)
flutter:
  uses-material-design: true
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
